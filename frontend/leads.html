<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leads — Insurance CRM</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h2>Insurance<span>CRM</span></h2>
      <p>Lead Management</p>
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/leads.html" class="nav-item active"><span class="nav-icon">👥</span> Leads</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-name" id="userName"></div>
      <div class="user-role">Insurance Agent</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <div class="header">
      <div class="header-title">Leads</div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">+ Add Lead</button>
      </div>
    </div>

    <div class="content">
      <div class="card">
        <div class="card-body">
          <div class="filters">
            <input class="search-input" id="searchInput" type="text" placeholder="Search name, phone, email..." oninput="filterLeads()">
            <select class="filter-select" id="statusFilter" onchange="filterLeads()">
              <option value="">All Statuses</option>
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="qualified">Qualified</option>
              <option value="converted">Converted</option>
              <option value="lost">Lost</option>
            </select>
            <select class="filter-select" id="sourceFilter" onchange="filterLeads()">
              <option value="">All Sources</option>
              <option value="manual">Manual</option>
              <option value="facebook">Facebook</option>
              <option value="referral">Referral</option>
              <option value="website">Website</option>
            </select>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Phone / Email</th>
                  <th>Status</th>
                  <th>Score</th>
                  <th>Source</th>
                  <th>Coverage Interest</th>
                  <th>Added</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="leadsTable">
                <tr><td colspan="8" style="text-align:center;padding:32px;color:var(--gray-500)">Loading…</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Add Lead Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add New Lead</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label>First Name *</label>
        <input type="text" id="aFirstName" placeholder="John">
      </div>
      <div class="form-group">
        <label>Last Name *</label>
        <input type="text" id="aLastName" placeholder="Smith">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="aPhone" placeholder="(407) 555-0100">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="aEmail" placeholder="john@example.com">
      </div>
      <div class="form-group">
        <label>Age</label>
        <input type="number" id="aAge" placeholder="42" min="18" max="90">
      </div>
      <div class="form-group">
        <label>Annual Income ($)</label>
        <input type="number" id="aIncome" placeholder="65000">
      </div>
      <div class="form-group">
        <label>Coverage Interest ($)</label>
        <input type="number" id="aCoverage" placeholder="250000">
      </div>
      <div class="form-group">
        <label>Health Status</label>
        <select id="aHealth">
          <option value="">Select…</option>
          <option value="excellent">Excellent</option>
          <option value="good">Good</option>
          <option value="fair">Fair</option>
          <option value="poor">Poor</option>
        </select>
      </div>
      <div class="form-group">
        <label>Source</label>
        <select id="aSource">
          <option value="manual">Manual</option>
          <option value="referral">Referral</option>
          <option value="website">Website</option>
          <option value="facebook">Facebook</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="aStatus">
          <option value="new">New</option>
          <option value="contacted">Contacted</option>
          <option value="qualified">Qualified</option>
        </select>
      </div>
    </div>
    <div class="form-group mt-4">
      <label>Notes</label>
      <textarea id="aNotes" placeholder="Any relevant notes…"></textarea>
    </div>
    <div class="form-actions mt-4">
      <button class="btn btn-primary" onclick="submitLead()">Add Lead</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/leads.js"></script>
</body>
</html>
