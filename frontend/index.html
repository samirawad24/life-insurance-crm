<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insurance CRM — Sign In</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <h1>Insurance<span>CRM</span></h1>
      <p>Life Insurance Lead Management</p>
    </div>

    <div id="authError" class="auth-error"></div>

    <div id="loginForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn btn-primary auth-submit" onclick="login()">Sign In</button>
      <div class="auth-toggle">No account? <a onclick="toggleForm()">Register</a></div>
    </div>

    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="regPassword" placeholder="••••••••" autocomplete="new-password">
      </div>
      <button class="btn btn-primary auth-submit" onclick="register()">Create Account</button>
      <div class="auth-toggle">Already have an account? <a onclick="toggleForm()">Sign In</a></div>
    </div>
  </div>
</div>
<script src="/static/js/api.js"></script>
<script src="/static/js/auth.js"></script>
</body>
</html>
