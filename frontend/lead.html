<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead — Insurance CRM</title>
  <link rel="stylesheet" href="/static/css/main.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <h2>Insurance<span>CRM</span></h2>
      <p>Lead Management</p>
    </div>
    <div class="sidebar-nav">
      <a href="/dashboard.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="/leads.html" class="nav-item"><span class="nav-icon">👥</span> Leads</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-name" id="userName"></div>
      <div class="user-role">Insurance Agent</div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </nav>

  <div class="main">
    <div class="header">
      <div class="flex items-center gap-3">
        <a href="/leads.html" class="btn btn-outline btn-sm">← Back</a>
        <div class="header-title" id="headerName">Lead Detail</div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openCallModal()">📞 Log Call</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>

    <div class="content">
      <!-- Lead Info Card -->
      <div class="card">
        <div class="card-header">
          <div class="flex items-center gap-3">
            <div class="score-circle cold" id="scoreCircle">—</div>
            <div>
              <div class="lead-name" id="leadName">Loading…</div>
              <div class="lead-meta" id="leadMeta"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <span id="leadStatusBadge"></span>
            <button class="btn btn-primary btn-sm" onclick="saveChanges()">Save Changes</button>
          </div>
        </div>
        <div class="card-body">
          <div class="form-grid">
            <div class="form-group"><label>First Name</label><input type="text" id="eFirstName"></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="eLastName"></div>
            <div class="form-group"><label>Phone</label><input type="tel" id="ePhone"></div>
            <div class="form-group"><label>Email</label><input type="email" id="eEmail"></div>
            <div class="form-group"><label>Age</label><input type="number" id="eAge" min="18" max="90"></div>
            <div class="form-group"><label>Annual Income ($)</label><input type="number" id="eIncome"></div>
            <div class="form-group"><label>Coverage Interest ($)</label><input type="number" id="eCoverage"></div>
            <div class="form-group">
              <label>Health Status</label>
              <select id="eHealth">
                <option value="">Select…</option>
                <option value="excellent">Excellent</option>
                <option value="good">Good</option>
                <option value="fair">Fair</option>
                <option value="poor">Poor</option>
              </select>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="eStatus">
                <option value="new">New</option>
                <option value="contacted">Contacted</option>
                <option value="qualified">Qualified</option>
                <option value="converted">Converted</option>
                <option value="lost">Lost</option>
              </select>
            </div>
            <div class="form-group">
              <label>Source</label>
              <select id="eSource">
                <option value="manual">Manual</option>
                <option value="referral">Referral</option>
                <option value="website">Website</option>
                <option value="facebook">Facebook</option>
              </select>
            </div>
          </div>
          <div class="form-group mt-4">
            <label>Notes</label>
            <textarea id="eNotes" rows="3"></textarea>
          </div>
        </div>
      </div>

      <!-- Call Log -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">📞 Call Log</div>
          <button class="btn btn-primary btn-sm" onclick="openCallModal()">+ Log Call</button>
        </div>
        <div id="callLog" style="padding: 0 20px 4px">
          <div class="empty-state"><div class="empty-icon">📞</div><p>No calls logged yet</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Log Call Modal -->
<div class="modal-overlay" id="callModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Log a Call</div>
      <button class="modal-close" onclick="closeCallModal()">×</button>
    </div>
    <div class="form-group" style="margin-bottom:13px">
      <label>Outcome</label>
      <select id="cOutcome">
        <option value="answered">Answered</option>
        <option value="voicemail">Left Voicemail</option>
        <option value="no_answer">No Answer</option>
        <option value="scheduled_callback">Scheduled Callback</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:13px">
      <label>Duration (minutes)</label>
      <input type="number" id="cDuration" placeholder="5" min="0" step="0.5">
    </div>
    <div class="form-group" style="margin-bottom:13px">
      <label>Notes</label>
      <textarea id="cNotes" placeholder="What was discussed?"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" onclick="submitCall()">Log Call</button>
      <button class="btn btn-outline" onclick="closeCallModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/lead.js"></script>
</body>
</html>
